<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homework Tracker</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        background: #f4f7fb;
        color: #1f2937;
      }

      .container {
        max-width: 800px;
        margin: 40px auto;
        padding: 24px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin-top: 0;
      }

      form {
        display: grid;
        gap: 12px;
        margin-bottom: 24px;
      }

      label {
        display: flex;
        flex-direction: column;
        font-weight: 600;
        gap: 6px;
      }

      input,
      textarea,
      button {
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        font-size: 1rem;
      }

      textarea {
        min-height: 90px;
        resize: vertical;
      }

      button {
        background: #2563eb;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: 600;
      }

      button:hover {
        background: #1d4ed8;
      }

      .assignment-list {
        list-style: none;
        padding: 0;
        display: grid;
        gap: 12px;
      }

      .assignment-item {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 14px;
        background: #f9fafb;
      }

      .assignment-item h3 {
        margin: 0 0 6px;
      }

      .meta {
        font-size: 0.95rem;
        color: #4b5563;
      }

      .empty {
        color: #6b7280;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Homework Tracker</h1>
      <form id="assignment-form">
        <label>
          Title
          <input id="title" name="title" type="text" placeholder="e.g. Algebra Homework" required />
        </label>
        <label>
          Course
          <input id="course" name="course" type="text" placeholder="e.g. MATH 101" required />
        </label>
        <label>
          Due Date
          <input id="dueDate" name="dueDate" type="date" required />
        </label>
        <label>
          Description
          <textarea id="description" name="description" placeholder="Add notes or instructions"></textarea>
        </label>
        <button type="submit">Add Assignment</button>
      </form>

      <section>
        <h2>Assignments</h2>
        <ul id="assignment-list" class="assignment-list"></ul>
      </section>
    </main>

    <script>
      const STORAGE_KEY = "homework-assignments";
      const form = document.getElementById("assignment-form");
      const list = document.getElementById("assignment-list");

      function loadAssignments() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        } catch (error) {
          console.error("Could not load assignments", error);
          return [];
        }
      }

      function saveAssignments(assignments) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(assignments));
      }

      function renderAssignments() {
        const assignments = loadAssignments();

        if (assignments.length === 0) {
          list.innerHTML = '<li class="empty">No assignments yet. Add one above.</li>';
          return;
        }

        list.innerHTML = assignments
          .map(
            (assignment) => `
              <li class="assignment-item">
                <h3>${assignment.title}</h3>
                <div class="meta">Course: ${assignment.course}</div>
                <div class="meta">Due: ${assignment.dueDate}</div>
                <p>${assignment.description || "No description provided."}</p>
              </li>
            `
          )
          .join("");
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const title = document.getElementById("title").value.trim();
        const course = document.getElementById("course").value.trim();
        const dueDate = document.getElementById("dueDate").value;
        const description = document.getElementById("description").value.trim();

        if (!title || !course || !dueDate) {
          alert("Please fill in the title, course, and due date.");
          return;
        }

        const assignments = loadAssignments();
        assignments.push({ title, course, dueDate, description });
        saveAssignments(assignments);
        form.reset();
        renderAssignments();
      });

      renderAssignments();
    </script>
  </body>
</html>
